# AUTH-004: Forgot password flow
# Equivalent to: Cypress login.cy.js → "Shows Forgot Password link"
appId: com.arpint.alphaquark
tags:
  - regression
  - auth

---

- launchApp:
    clearState: true

- waitForAnimationToEnd

# Tap "Forgot Password" link
- tapOn:
    text: "(?i)forgot.*password"
    label: "Tap Forgot Password link"

- waitForAnimationToEnd

# Should navigate to reset password screen
- assertVisible:
    text: "(?i)(reset|recover|forgot|send.*link|enter.*email)"
    label: "Reset password screen is visible"

# Enter email for password reset
- tapOn:
    hint: "(?i).*email.*"
- inputText: "testuser@alphaquark.in"
- hideKeyboard

# Tap send/reset button
- tapOn:
    text: "(?i)(send|reset|submit|continue)"
    optional: true

- waitForAnimationToEnd

# Should show success message or stay on screen without crash
- assertVisible:
    id: ".*"
    label: "App did not crash after password reset request"
